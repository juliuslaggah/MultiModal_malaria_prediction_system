services:
  - type: web
    name: malaria-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: malaria-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: malaria-db
    plan: free
    databaseName: malaria_db
    user: malaria_user
    